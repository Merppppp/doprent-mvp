# Pipeline: build-release + deploy-prod
# Trigger: tag push (v*)
# Flow:    clone prod config → build & push to GHCR → deploy to VPS prod stack

when:
  - event: tag
    ref: "refs/tags/v*"

steps:
  - name: clone-config
    image: alpine/git
    environment:
      CONFIG_TOKEN:
        from_secret: config_token_prod
    commands:
      - "git clone --depth 1 https://x-access-token:$${CONFIG_TOKEN}@github.com/doprent/doprent-config-prod.git .config"
      - wc -l .config/doprent-mvp/prod.env

  - name: build-push-release
    image: docker:27-cli
    environment:
      GHCR_USERNAME:
        from_secret: ghcr_username
      GHCR_TOKEN:
        from_secret: ghcr_token
    commands:
      - "echo \"$$GHCR_TOKEN\" | docker login ghcr.io -u \"$$GHCR_USERNAME\" --password-stdin"
      # Only pass args the Dockerfile declares (DATABASE_URL, NEXT_PUBLIC_*).
      # Values with spaces (e.g. EMAIL_FROM="DopRent <...>") would word-split
      # and break `docker build` — and they are runtime env, not build args.
      - "BUILD_ARGS=$$(grep -E '^(DATABASE_URL|NEXT_PUBLIC_[A-Z_]*)=' .config/doprent-mvp/prod.env | sed 's/^/--build-arg /' | tr '\\n' ' ')"
      - "docker build $$BUILD_ARGS -t ghcr.io/doprent/doprent-mvp:${CI_COMMIT_TAG} ."
      - "docker push ghcr.io/doprent/doprent-mvp:${CI_COMMIT_TAG}"

  - name: deploy-prod
    image: alpine
    environment:
      DEPLOY_SSH_KEY:
        from_secret: deploy_ssh_key
    commands:
      - apk add --no-cache openssh-client
      - mkdir -p ~/.ssh
      - "echo \"$$DEPLOY_SSH_KEY\" > ~/.ssh/id_rsa"
      - chmod 600 ~/.ssh/id_rsa
      - "scp -o StrictHostKeyChecking=no .config/doprent-mvp/prod.env deploy@157.85.101.85:/opt/doprent/doprent-server/envs/prod.env"
      - >-
        ssh -o StrictHostKeyChecking=no deploy@157.85.101.85 "
          if docker service inspect doprent-mvp-prod_app >/dev/null 2>&1; then
            echo 'Service exists — updating image...';
            docker service update --image ghcr.io/doprent/doprent-mvp:${CI_COMMIT_TAG} doprent-mvp-prod_app --with-registry-auth;
          else
            echo 'First deploy — creating stack...';
            cd /opt/doprent/doprent-server &&
            set -a && source envs/prod.env && set +a &&
            export IMAGE_TAG=${CI_COMMIT_TAG} &&
            docker stack deploy -c stacks/app-template.yml doprent-mvp-prod --with-registry-auth;
          fi
        "
