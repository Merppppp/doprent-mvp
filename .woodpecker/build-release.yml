# Pipeline: build-release
# Trigger: tag push (v*)
# Steps:   build & push to GHCR with semver tag (NO deployment)

when:
  - event: tag
    ref: "refs/tags/v*"

steps:
  - name: build-push-release
    image: woodpeckerci/plugin-docker-buildx
    settings:
      registry: ghcr.io
      repo: ghcr.io/doprent/doprent-mvp
      tags: ${CI_COMMIT_TAG}
      username:
        from_secret: ghcr_username
      password:
        from_secret: ghcr_token
      build_args_from_env:
        - DATABASE_URL
    environment:
      DATABASE_URL:
        from_secret: database_url_prod
