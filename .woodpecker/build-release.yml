# =============================================================================
# Pipeline: build-release
# Trigger: tag push (e.g. v1.0.0, v1.2.3)
# Steps:   build & push to GHCR with semver tag (NO deployment)
#
# Required secrets (configure in Woodpecker UI):
#   ghcr_username  — GitHub username with GHCR write access
#   ghcr_token     — GitHub Personal Access Token (packages:write)
#
# Usage:
#   git tag v1.0.0 && git push origin v1.0.0
#   → builds ghcr.io/doprent/doprent-mvp:v1.0.0
#   → deploy manually via deploy-prod pipeline
# =============================================================================

when:
  event: tag
  tag: "v*"

steps:
  - name: build-push-release
    image: docker:24-cli
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      GHCR_USERNAME:
        from_secret: ghcr_username
      GHCR_TOKEN:
        from_secret: ghcr_token
    commands:
      - TAG=$CI_COMMIT_TAG
      - echo "Building release image ghcr.io/doprent/doprent-mvp:$TAG"
      - echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USERNAME" --password-stdin
      - docker build -t ghcr.io/doprent/doprent-mvp:$TAG .
      - docker push ghcr.io/doprent/doprent-mvp:$TAG
      - echo "Release image pushed. Deploy with deploy-prod pipeline using IMAGE_TAG=$TAG"
