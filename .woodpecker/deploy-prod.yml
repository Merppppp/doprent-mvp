# =============================================================================
# Pipeline: deploy-prod
# Trigger: MANUAL only — specify IMAGE_TAG input before running
# Steps:   pull specified image → deploy to prod stack on VPS
#
# Required secrets (configure in Woodpecker UI):
#   deploy_ssh_key — Private SSH key for deploy@157.85.101.85
#   ghcr_username  — GitHub username (for registry auth on remote)
#   ghcr_token     — GitHub Personal Access Token (packages:read)
#
# Usage in Woodpecker UI:
#   1. Go to Pipelines → deploy-prod → Trigger manually
#   2. Set env var: IMAGE_TAG=v1.0.0
#   3. Run
# =============================================================================

when:
  event: manual

variables:
  - &image_tag "${IMAGE_TAG:-MUST_SET_IMAGE_TAG}"

steps:
  - name: validate-input
    image: alpine
    commands:
      - |
        if [ -z "$IMAGE_TAG" ] || [ "$IMAGE_TAG" = "MUST_SET_IMAGE_TAG" ]; then
          echo "ERROR: IMAGE_TAG env var is required. Set it before triggering this pipeline."
          echo "Example: IMAGE_TAG=v1.0.0"
          exit 1
        fi
      - echo "Deploying image ghcr.io/doprent/doprent-mvp:$IMAGE_TAG to prod"
    environment:
      IMAGE_TAG: *image_tag

  - name: deploy-prod
    image: alpine
    environment:
      DEPLOY_SSH_KEY:
        from_secret: deploy_ssh_key
      GHCR_USERNAME:
        from_secret: ghcr_username
      GHCR_TOKEN:
        from_secret: ghcr_token
      IMAGE_TAG: *image_tag
    commands:
      - apk add --no-cache openssh-client
      - mkdir -p ~/.ssh
      - echo "$DEPLOY_SSH_KEY" > ~/.ssh/id_rsa
      - chmod 600 ~/.ssh/id_rsa
      - >-
        ssh -o StrictHostKeyChecking=no deploy@157.85.101.85
        "echo '$GHCR_TOKEN' | docker login ghcr.io -u '$GHCR_USERNAME' --password-stdin &&
         docker service update --image ghcr.io/doprent/doprent-mvp:${IMAGE_TAG} doprent-mvp-prod_app --with-registry-auth"
      - echo "Deployed ghcr.io/doprent/doprent-mvp:$IMAGE_TAG to prod stack"
