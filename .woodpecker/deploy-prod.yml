# Pipeline: deploy-prod
# Trigger: manual only
# Usage: trigger manually in Woodpecker UI, set IMAGE_TAG variable

when:
  - event: manual

steps:
  - name: validate-input
    image: alpine
    commands:
      - |
        if [ -z "$IMAGE_TAG" ] || [ "$IMAGE_TAG" = "MUST_SET_IMAGE_TAG" ]; then
          echo "ERROR: IMAGE_TAG env var is required."
          echo "Example: IMAGE_TAG=v1.0.0"
          exit 1
        fi
      - echo "Deploying image ghcr.io/doprent/doprent-mvp:$IMAGE_TAG to prod"

  - name: clone-config
    image: alpine/git
    environment:
      CONFIG_KEY:
        from_secret: config_deploy_key_prod
    commands:
      - mkdir -p ~/.ssh
      - echo "$CONFIG_KEY" > ~/.ssh/id_rsa && chmod 600 ~/.ssh/id_rsa
      - ssh-keyscan github.com >> ~/.ssh/known_hosts 2>/dev/null
      - git clone --depth 1 git@github.com:doprent/doprent-config-prod.git .config
      - echo "Config loaded:" && wc -l .config/doprent-mvp/prod.env

  - name: deploy-prod
    image: alpine
    environment:
      DEPLOY_SSH_KEY:
        from_secret: deploy_ssh_key
      GHCR_USERNAME:
        from_secret: ghcr_username
      GHCR_TOKEN:
        from_secret: ghcr_token
    commands:
      - apk add --no-cache openssh-client
      - mkdir -p ~/.ssh
      - echo "$DEPLOY_SSH_KEY" > ~/.ssh/id_rsa
      - chmod 600 ~/.ssh/id_rsa
      - scp -o StrictHostKeyChecking=no .config/doprent-mvp/prod.env deploy@157.85.101.85:/opt/doprent/doprent-server/envs/prod.env
      - >-
        ssh -o StrictHostKeyChecking=no deploy@157.85.101.85
        "echo '$GHCR_TOKEN' | docker login ghcr.io -u '$GHCR_USERNAME' --password-stdin &&
         docker service update --image ghcr.io/doprent/doprent-mvp:${IMAGE_TAG} doprent-mvp-prod_app --with-registry-auth"
      - echo "Deployed ghcr.io/doprent/doprent-mvp:$IMAGE_TAG to prod"
