# Pipeline: deploy-dev
# Trigger: push to develop branch
# Steps:   build & push to GHCR → deploy to VPS dev stack

when:
  - branch: develop
    event: push

steps:
  - name: prepare-tag
    image: alpine
    commands:
      - SHORT_SHA=$(echo $CI_COMMIT_SHA | cut -c1-7)
      - echo "dev-$SHORT_SHA" > .tag
      - echo "Image tag:" && cat .tag

  - name: build-push
    image: woodpeckerci/plugin-docker-buildx
    settings:
      registry: ghcr.io
      repo: ghcr.io/doprent/doprent-mvp
      tags: dev-${CI_COMMIT_SHA:0:7}
      username:
        from_secret: ghcr_username
      password:
        from_secret: ghcr_token

  - name: deploy-dev
    image: alpine
    environment:
      DEPLOY_SSH_KEY:
        from_secret: deploy_ssh_key
    commands:
      - apk add --no-cache openssh-client
      - TAG=$(cat .tag)
      - mkdir -p ~/.ssh
      - echo "$DEPLOY_SSH_KEY" > ~/.ssh/id_rsa
      - chmod 600 ~/.ssh/id_rsa
      - >-
        ssh -o StrictHostKeyChecking=no deploy@157.85.101.85
        "docker service update --image ghcr.io/doprent/doprent-mvp:${TAG} doprent-mvp-dev_app --with-registry-auth"
      - echo "Deployed $TAG to dev stack"
