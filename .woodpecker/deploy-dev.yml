# Pipeline: deploy-dev
# Trigger: push to develop branch
# Flow:    clone config → build & push to GHCR → deploy to VPS dev stack

when:
  - branch: develop
    event: push

steps:
  - name: prepare-tag
    image: alpine
    commands:
      - echo "dev-$$(echo $$CI_COMMIT_SHA | cut -c1-7)" > .tag
      - cat .tag

  - name: clone-config
    image: alpine/git
    environment:
      CONFIG_TOKEN:
        from_secret: config_token_nonprod
    commands:
      - "git clone --depth 1 https://x-access-token:$${CONFIG_TOKEN}@github.com/doprent/doprent-config-non-prod.git .config"
      - wc -l .config/doprent-mvp/dev.env

  - name: build-push
    image: docker:27-cli
    environment:
      GHCR_USERNAME:
        from_secret: ghcr_username
      GHCR_TOKEN:
        from_secret: ghcr_token
    commands:
      - TAG=$$(cat .tag)
      - "echo \"$$GHCR_TOKEN\" | docker login ghcr.io -u \"$$GHCR_USERNAME\" --password-stdin"
      # Only pass args the Dockerfile declares (DATABASE_URL, NEXT_PUBLIC_*).
      # Values with spaces (e.g. EMAIL_FROM="DopRent <...>") would word-split
      # and break `docker build` — and they are runtime env, not build args.
      - "BUILD_ARGS=$$(grep -E '^(DATABASE_URL|NEXT_PUBLIC_[A-Z_]*)=' .config/doprent-mvp/dev.env | sed 's/^/--build-arg /' | tr '\\n' ' ')"
      - "docker build $$BUILD_ARGS -t ghcr.io/doprent/doprent-mvp:$$TAG ."
      - "docker push ghcr.io/doprent/doprent-mvp:$$TAG"

  - name: deploy-dev
    image: alpine
    environment:
      DEPLOY_SSH_KEY:
        from_secret: deploy_ssh_key
    commands:
      - apk add --no-cache openssh-client
      - TAG=$$(cat .tag)
      - mkdir -p ~/.ssh
      - "echo \"$$DEPLOY_SSH_KEY\" > ~/.ssh/id_rsa"
      - chmod 600 ~/.ssh/id_rsa
      - "scp -o StrictHostKeyChecking=no .config/doprent-mvp/dev.env deploy@157.85.101.85:/opt/doprent/doprent-server/envs/dev.env"
      # Always run a full `docker stack deploy` (idempotent), same as deploy-uat:
      # it re-applies the template's `environment:` block every time, so env vars
      # added to app-template.yml / dev.env actually reach the running container.
      # A bare `docker service update --image` only swaps the image and leaves the
      # service env frozen at stack-creation time. Swarm only updates services/
      # configs that actually changed, so this is safe to run on every push.
      - >-
        ssh -o StrictHostKeyChecking=no deploy@157.85.101.85 "
          cd /opt/doprent/doprent-server &&
          set -a && source envs/dev.env && set +a &&
          export IMAGE_TAG=$${TAG} &&
          docker stack deploy -c stacks/app-template.yml doprent-mvp-dev --with-registry-auth
        "
