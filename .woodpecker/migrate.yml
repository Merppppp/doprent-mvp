# Pipeline: migrate
# Trigger: manual only
# Variables: TARGET_ENV (dev|uat|prod), IMAGE_TAG (e.g. dev-abc1234, uat-def5678, v1.0.0)
# Runs: prisma migrate deploy using the app image on VPS via Docker

when:
  - event: manual

steps:
  - name: validate-input
    image: alpine
    commands:
      - |
        if [ -z "$TARGET_ENV" ]; then
          echo "ERROR: TARGET_ENV is required (dev|uat|prod)"
          exit 1
        fi
        case "$TARGET_ENV" in
          dev|uat|prod) ;;
          *) echo "ERROR: TARGET_ENV must be dev, uat, or prod"; exit 1 ;;
        esac
      - |
        if [ -z "$IMAGE_TAG" ]; then
          echo "ERROR: IMAGE_TAG is required (e.g. dev-abc1234, v1.0.0)"
          exit 1
        fi
      - echo "Migration: env=$TARGET_ENV image=ghcr.io/doprent/doprent-mvp:$IMAGE_TAG"

  - name: clone-config
    image: alpine/git
    environment:
      CONFIG_KEY_NONPROD:
        from_secret: config_deploy_key_nonprod
      CONFIG_KEY_PROD:
        from_secret: config_deploy_key_prod
    commands:
      - mkdir -p ~/.ssh
      - ssh-keyscan github.com >> ~/.ssh/known_hosts 2>/dev/null
      - |
        if [ "$TARGET_ENV" = "prod" ]; then
          echo "$CONFIG_KEY_PROD" > ~/.ssh/id_rsa
          REPO=doprent-config-prod
        else
          echo "$CONFIG_KEY_NONPROD" > ~/.ssh/id_rsa
          REPO=doprent-config-non-prod
        fi
        chmod 600 ~/.ssh/id_rsa
        git clone --depth 1 git@github.com:doprent/$REPO.git .config
      - echo "Migrate env:" && cat .config/doprent-mvp/${TARGET_ENV}.migrate.env

  - name: run-migration
    image: alpine
    environment:
      DEPLOY_SSH_KEY:
        from_secret: deploy_ssh_key
    commands:
      - apk add --no-cache openssh-client
      - mkdir -p ~/.ssh
      - echo "$DEPLOY_SSH_KEY" > ~/.ssh/id_rsa
      - chmod 600 ~/.ssh/id_rsa
      - DB_URL=$(grep -vE '^(#|$)' .config/doprent-mvp/${TARGET_ENV}.migrate.env | grep DATABASE_URL | cut -d= -f2-)
      - >-
        ssh -o StrictHostKeyChecking=no deploy@157.85.101.85
        "docker run --rm
        --network app-net
        -e DATABASE_URL='${DB_URL}'
        ghcr.io/doprent/doprent-mvp:${IMAGE_TAG}
        npx prisma migrate deploy"
      - echo "Migration completed for $TARGET_ENV"
