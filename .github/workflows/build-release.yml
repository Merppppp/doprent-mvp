# Pipeline: build-release
# Trigger: tag push (v*)
# Steps:   build & push to GHCR with semver tag (NO deployment)
#
# Usage:
#   git tag v1.0.0 && git push origin v1.0.0
#   → builds ghcr.io/doprent/doprent-mvp:v1.0.0
#   → deploy manually via deploy-prod workflow

name: Build Release

on:
  push:
    tags: ["v*"]

env:
  IMAGE: ghcr.io/doprent/doprent-mvp

jobs:
  build-release:
    if: github.repository == 'doprent/doprent-mvp'
    runs-on: ubuntu-latest
    environment: production

    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ secrets.GHCR_USERNAME }}
          password: ${{ secrets.GHCR_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ env.IMAGE }}:${{ github.ref_name }}
          build-args: |
            NEXT_PUBLIC_SITE_URL=${{ vars.NEXT_PUBLIC_SITE_URL }}
            NEXT_PUBLIC_DEFAULT_LINE_URL=${{ vars.NEXT_PUBLIC_DEFAULT_LINE_URL }}
            NEXT_PUBLIC_GA_ID=${{ vars.NEXT_PUBLIC_GA_ID }}
            NEXT_PUBLIC_CLARITY_ID=${{ vars.NEXT_PUBLIC_CLARITY_ID }}
