# Pipeline: deploy-prod
# Trigger: manual only (workflow_dispatch)
# Steps:   deploy specified image tag to prod stack on VPS
#
# Required secrets:
#   DEPLOY_SSH_KEY — Private SSH key for deploy@157.85.101.85
#
# Usage:
#   1. Go to Actions → Deploy Prod → Run workflow
#   2. Enter image tag (e.g. v1.0.0)
#   3. Run

name: Deploy Prod

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Image tag to deploy (e.g. v1.0.0)"
        required: true
        type: string

env:
  IMAGE: ghcr.io/doprent/doprent-mvp

jobs:
  deploy-prod:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to VPS
        env:
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$DEPLOY_SSH_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh -o StrictHostKeyChecking=no deploy@157.85.101.85 \
            "echo '${{ secrets.GITHUB_TOKEN }}' | docker login ghcr.io -u '${{ github.actor }}' --password-stdin && \
             docker service update --image ${{ env.IMAGE }}:${{ inputs.image_tag }} doprent-mvp-prod_app --with-registry-auth"
