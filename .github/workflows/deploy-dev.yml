# Pipeline: deploy-dev
# Trigger: push to develop branch
# Steps:   build & push to GHCR → deploy to VPS dev stack
#
# Required secrets (on doprent/doprent-mvp):
#   GHCR_USERNAME  — GitHub username with GHCR write access
#   GHCR_TOKEN     — GitHub PAT (packages:write)
#   DEPLOY_SSH_KEY — Private SSH key for deploy@157.85.101.85

name: Deploy Dev

on:
  push:
    branches: [develop]

env:
  IMAGE: ghcr.io/doprent/doprent-mvp

jobs:
  build-and-deploy:
    if: github.repository == 'doprent/doprent-mvp'
    runs-on: ubuntu-latest
    environment: dev

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: admin
          POSTGRES_PASSWORD: "12345678"
          POSTGRES_DB: doprent_dev
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U admin -d doprent_dev"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set image tag
        run: echo "TAG=dev-${GITHUB_SHA::7}" >> "$GITHUB_ENV"

      - name: Run Prisma migrate on build DB
        run: |
          npm ci
          npx prisma migrate deploy
        env:
          DATABASE_URL: postgresql://admin:12345678@localhost:5432/doprent_dev

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ secrets.GHCR_USERNAME }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Build and push
        run: |
          docker build \
            --network host \
            --build-arg DATABASE_URL=postgresql://admin:12345678@localhost:5432/doprent_dev \
            --build-arg NEXT_PUBLIC_SITE_URL=${{ vars.NEXT_PUBLIC_SITE_URL }} \
            --build-arg NEXT_PUBLIC_DEFAULT_LINE_URL=${{ vars.NEXT_PUBLIC_DEFAULT_LINE_URL }} \
            --build-arg NEXT_PUBLIC_GA_ID=${{ vars.NEXT_PUBLIC_GA_ID }} \
            --build-arg NEXT_PUBLIC_CLARITY_ID=${{ vars.NEXT_PUBLIC_CLARITY_ID }} \
            -t ${{ env.IMAGE }}:${{ env.TAG }} \
            .
          docker push ${{ env.IMAGE }}:${{ env.TAG }}

      - name: Deploy to VPS
        env:
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$DEPLOY_SSH_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh -o StrictHostKeyChecking=no deploy@157.85.101.85 \
            "docker service update --image ${{ env.IMAGE }}:${{ env.TAG }} doprent-mvp-dev_app --with-registry-auth"
