# DopRent PostgreSQL config
# Tuned for: 4 vCPU, 6GB RAM VPS shared with Next.js + PgBouncer
# PostgreSQL is behind PgBouncer so max_connections can stay low.

# --- Connections ---
listen_addresses = '*'                # accept connections from all interfaces (Docker network + host)
max_connections = 30                  # PgBouncer handles client connections

# --- Memory ---
shared_buffers = 512MB                # ~25% of RAM allocated to Postgres (rest goes to Next.js)
effective_cache_size = 2GB            # hint to planner: OS cache + shared_buffers
work_mem = 8MB                        # per sort/hash op; 30 conn × 8MB = 240MB worst case
maintenance_work_mem = 128MB          # for VACUUM, CREATE INDEX

# --- WAL ---
wal_buffers = 16MB
checkpoint_completion_target = 0.9
min_wal_size = 80MB
max_wal_size = 1GB

# --- Query planner ---
default_statistics_target = 100
random_page_cost = 1.1               # SSD

# --- Logging (minimal in production) ---
log_min_duration_statement = 500     # log queries slower than 500ms
log_line_prefix = '%t [%p]: '
